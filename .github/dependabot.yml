version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    # One combined PR per week for routine bumps; only majors arrive alone.
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      # Pinned to the exact versions the obsidian package declares as peers.
      - dependency-name: "@codemirror/*"
      # typescript-eslint supports TypeScript < 6.1 only; stay on ~6.0.x
      # until the support range moves.
      - dependency-name: "typescript"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
    # Keep commitlint happy on dependabot PRs.
    commit-message:
      prefix: "build"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: "ci"
