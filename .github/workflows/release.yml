name: Release

# Every push to main is analyzed by semantic-release: conventional commits
# decide whether (and how) to bump the version. When a release is due it
# updates package.json/manifest.json/versions.json/CHANGELOG.md, tags the
# commit, and publishes a GitHub release with the plugin files attached.
on:
  push:
    branches: [main]

# All writes go through the RELEASE_TOKEN PAT; the default GITHUB_TOKEN
# is unused and gets no write access.
permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build and release
    runs-on: self-hosted  # ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          # semantic-release needs the full history to find the last release tag
          fetch-depth: 0
          # PAT with permission to push past main's branch protection; the
          # default GITHUB_TOKEN cannot bypass it.
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: |
          npm run lint
          npm run typecheck
          npm test

      - name: Build
        run: npm run build

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: npx semantic-release
